<div class="table-section">
  <div class="table-header">
    <h3>Composición Familiar</h3>
    <button type="button" class="btn-add" (click)="onAddRow()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Agregar Familiar
    </button>
  </div>

  <div class="table-responsive">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombres y Apellidos</th>
          <th>Fecha Nacimiento</th>
          <th>Cédula</th>
          <th>Estado Civil</th>
          <th>Parentesco</th>
          <th>Nivel Estudios</th>
          <th>Título</th>
          <th>Labor/Ocupación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (row of formArray.controls; track $index) {
          <tr [formGroup]="getRowGroup($index)">
            <td>
              <input 
                type="text" 
                formControlName="nombresApellidos" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'nombresApellidos')"
                placeholder="Nombres completos"
              />
            </td>
            <td>
              <input 
                type="date" 
                formControlName="fechaNacimiento" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'fechaNacimiento')"
              />
            </td>
            <td>
              <input 
                type="text" 
                formControlName="cedulaIdentidad" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'cedulaIdentidad')"
                placeholder="Cédula"
              />
            </td>
            <td>
              <input 
                type="text" 
                formControlName="estadoCivil" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'estadoCivil')"
                placeholder="Estado civil"
              />
            </td>
            <td>
              <select 
                formControlName="parentesco" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'parentesco')"
              >
                <option value="">Seleccione</option>
                @for (opcion of parentescoOpciones; track opcion.value) {
                  <option [value]="opcion.value">{{ opcion.label }}</option>
                }
              </select>
            </td>
            <td>
              <input 
                type="text" 
                formControlName="nivelEstudios" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'nivelEstudios')"
                placeholder="Nivel"
              />
            </td>
            <td>
              <input 
                type="text" 
                formControlName="titulo" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'titulo')"
                placeholder="Título"
              />
            </td>
            <td>
              <input 
                type="text" 
                formControlName="laborOcupacion" 
                class="form-control table-input"
                [class.error]="hasError(getRowGroup($index), 'laborOcupacion')"
                placeholder="Ocupación"
              />
            </td>
            <td>
              <button 
                type="button" 
                class="btn-remove" 
                (click)="onRemoveRow($index)"
                [disabled]="formArray.length === 0"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </td>
          </tr>
        }
        @if (formArray.length === 0) {
          <tr>
            <td colspan="9" class="empty-state">
              No hay registros. Haga clic en "Agregar Familiar" para comenzar.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
